<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>บันทึกอุณหภูมิตู้เย็น เก็บเลือด CNMI</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
  * { box-sizing: border-box; }

  :root {
    --bg-1: #edf4fb;
    --bg-2: #f8fbff;
    --sidebar-bg: #f7fbff;
    --sidebar-border: #dbe7f3;
    --card-bg: rgba(255,255,255,0.92);
    --text-main: #1e293b;
    --text-soft: #64748b;
    --primary: #2563eb;
    --primary-soft: #60a5fa;
    --primary-dark: #1d4ed8;
    --secondary: #0ea5e9;
    --secondary-soft: #67e8f9;
    --border: #d6e2ee;
    --input-bg: #f8fbff;
    --success-bg: #ecfdf5;
    --success-border: #34d399;
    --success-text: #065f46;
    --error-bg: #fef2f2;
    --error-border: #f87171;
    --error-text: #991b1b;
    --table-head: #eef6ff;
  }

  body {
    margin: 0;
    font-family: "Segoe UI", Tahoma, sans-serif;
    background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
    min-height: 100vh;
    color: var(--text-main);
  }

  .app {
    display: flex;
    min-height: 100vh;
  }

  .sidebar {
    width: 260px;
    background: rgba(247, 251, 255, 0.88);
    backdrop-filter: blur(12px);
    border-right: 1px solid var(--sidebar-border);
    padding: 24px 16px;
    box-shadow: 0 0 30px rgba(37, 99, 235, 0.04);
  }

  .brand {
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 20px;
    color: #1e40af;
    letter-spacing: 0.2px;
  }

  .menu-btn {
    width: 100%;
    border: 1px solid transparent;
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    background: #eef4fa;
    color: #334155;
    transition: all 0.2s ease;
  }

  .menu-btn.active {
    background: linear-gradient(90deg, #3b82f6, #38bdf8);
    color: white;
    box-shadow: 0 8px 20px rgba(59, 130, 246, 0.22);
  }

  .menu-btn:hover {
    transform: translateY(-1px);
    background: #e6f0fb;
  }

  .main {
    flex: 1;
    padding: 24px;
  }

  .card {
    max-width: 900px;
    margin: 0 auto;
    background: var(--card-bg);
    border: 1px solid rgba(214, 226, 238, 0.9);
    border-radius: 24px;
    padding: 24px;
    box-shadow: 0 16px 36px rgba(15, 23, 42, 0.06);
  }

  h1 {
    margin-top: 0;
    margin-bottom: 20px;
    color: #1d4ed8;
    font-size: 32px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .full {
    grid-column: 1 / -1;
  }

  label {
    display: block;
    margin-bottom: 6px;
    font-weight: 700;
    color: #334155;
  }

  input, select, textarea, button {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: 1px solid var(--border);
    font-size: 16px;
  }

  input, select, textarea {
    background: var(--input-bg);
    color: var(--text-main);
  }

  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--primary-soft);
    box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.18);
  }

  textarea {
    min-height: 100px;
    resize: vertical;
  }

  .row-flex {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn-primary {
    border: none;
    font-weight: 700;
    cursor: pointer;
    color: white;
    background: linear-gradient(90deg, var(--primary), var(--primary-soft));
    box-shadow: 0 10px 20px rgba(37, 99, 235, 0.18);
    transition: all 0.2s ease;
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 14px 24px rgba(37, 99, 235, 0.24);
  }

  .btn-secondary {
    border: none;
    font-weight: 700;
    cursor: pointer;
    color: white;
    background: linear-gradient(90deg, #0f766e, var(--secondary));
    box-shadow: 0 10px 20px rgba(14, 165, 233, 0.16);
    transition: all 0.2s ease;
  }

  .btn-secondary:hover {
    transform: translateY(-1px);
    box-shadow: 0 14px 24px rgba(14, 165, 233, 0.22);
  }

  .result {
    margin-top: 18px;
    padding: 14px;
    border-radius: 14px;
    white-space: pre-wrap;
    display: none;
    font-weight: 600;
  }

  .success {
    background: var(--success-bg);
    border: 1px solid var(--success-border);
    color: var(--success-text);
  }

  .error {
    background: var(--error-bg);
    border: 1px solid var(--error-border);
    color: var(--error-text);
  }

  .hidden {
    display: none;
  }

  .section-title {
    margin: 0 0 16px 0;
    color: #2563eb;
    font-size: 26px;
    font-weight: 800;
  }

  .chart-wrap {
    margin-top: 20px;
    background: white;
    padding: 18px;
    border-radius: 18px;
    border: 1px solid var(--border);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
  }

  .table-wrap {
    margin-top: 18px;
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 16px;
    background: white;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  th, td {
    padding: 12px;
    border-bottom: 1px solid #edf2f7;
    text-align: left;
  }

  th {
    background: var(--table-head);
    color: #334155;
    font-weight: 700;
  }

  #reader {
    width: 100%;
    max-width: 360px;
    margin-top: 12px;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: white;
  }

  .small-note {
    margin-top: 8px;
    font-size: 13px;
    color: var(--text-soft);
  }

  @media (max-width: 860px) {
    .app {
      flex-direction: column;
    }

    .sidebar {
      width: 100%;
      border-right: none;
      border-bottom: 1px solid var(--sidebar-border);
    }

    .grid {
      grid-template-columns: 1fr;
    }
  }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      box-shadow: none !important;
      transform: none !important;
    }

    #time[readonly] {
      background: #f1f5f9;
      cursor: not-allowed;
      pointer-events: none;
    }
    
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">Menu</div>
      <button class="menu-btn active" onclick="showPage('formPage', this)">บันทึกข้อมูล</button>
      <button class="menu-btn" onclick="showPage('historyPage', this)">ดูย้อนหลัง</button>
      <button class="menu-btn" onclick="showPage('chartPage', this)">ดูกราฟ</button>
    </aside>

    <main class="main">
      <section id="formPage" class="card">
        <h1>บันทึกอุณหภูมิตู้เย็น ส่วนประกอบโลหิต</h1>

        <div class="grid">
          <div>
            <label for="date">วันที่</label>
            <input type="date" id="date" required />
          </div>

          <div>
            <label for="round">รอบ</label>
            <select id="round" onchange="setTimeByRound(); validateForm()" required>
              <option value="">-- เลือกรอบ --</option>
              <option value="เช้า">เช้า</option>
              <option value="เย็น">เย็น</option>
            </select>
          </div>

          <div class="full">
            <label for="roomSelect">ห้อง / สถานที่เก็บ</label>
            <select id="roomSelect" onchange="onRoomChange(); validateForm()">
              <option value="">-- เลือกห้อง --</option>
            </select>

            <label for="fridgeSelect" style="margin-top:12px;">เลือกตู้</label>
            <select id="fridgeSelect" onchange="onSelectChange(); validateForm()">
              <option value="">-- เลือกตู้ --</option>
            </select>

            <label for="fridgeId" style="margin-top:12px;">รหัสตู้</label>
            <div class="row-flex">
              <input type="text" id="fridgeId" placeholder="เลือกจากรายการ หรือสแกน QR หรือพิมพ์รหัส" oninput="validateForm()" />
              <button type="button" class="btn-secondary" onclick="toggleScanner()">สแกน QR</button>
            </div>

            <div id="reader" class="hidden"></div>
            <div class="small-note">เลือกจากรายการ หรือสแกน QR ได้ เช่น CN-B-00307-RT</div>
          </div>

          <div>
            <label for="temp">อุณหภูมิ (°C)</label>
            <input type="number" id="temp" step="0.1" placeholder="เช่น 4.0" oninput="validateForm()" required />
          </div>

          <div>
            <label for="time">เวลา</label>
            <input type="text" id="time" readonly required />
          </div>

          <div class="full">
            <label for="note">หมายเหตุ</label>
            <textarea id="note" placeholder="ถ้ามี"></textarea>
          </div>

          <div class="full">
            <button class="btn-primary" id="submitBtn" onclick="submitForm()" disabled>บันทึกข้อมูล</button>
          </div>
        </div>

        <div id="result" class="result"></div>
      </section>

      <section id="historyPage" class="card hidden">
  <h2 class="section-title">ดูย้อนหลัง</h2>

  <div class="grid">
    <div class="full">
      <label for="historyRoomSelect">ห้อง / สถานที่เก็บ</label>
      <select id="historyRoomSelect" onchange="onHistoryRoomChange()">
        <option value="">-- เลือกห้อง --</option>
      </select>
    </div>

    <div class="full">
      <label for="historyFridgeSelect">เลือกตู้</label>
      <select id="historyFridgeSelect" onchange="onHistorySelectChange()">
        <option value="">-- เลือกตู้ --</option>
      </select>
    </div>

    <div class="full">
      <label for="historyFridgeId">รหัสตู้</label>
      <div class="row-flex">
        <input type="text" id="historyFridgeId" placeholder="เลือกจากรายการ หรือสแกน QR หรือพิมพ์รหัส" />
        <button type="button" class="btn-secondary" onclick="toggleHistoryScanner()">สแกน QR</button>
      </div>
      <div id="historyReader" class="hidden"></div>
      <div class="small-note">เลือกจากรายการ หรือสแกน QR ได้</div>
    </div>

    <div>
      <label for="startDate">วันที่เริ่ม</label>
      <input type="date" id="startDate" />
    </div>

    <div>
      <label for="endDate">วันที่สิ้นสุด</label>
      <input type="date" id="endDate" />
    </div>

    <div class="full row-flex">
      <button class="btn-primary" onclick="loadHistory()">แสดงข้อมูลย้อนหลัง</button>
      <button type="button" class="btn-secondary" onclick="exportCSV()">Export CSV</button>
    </div>
  </div>

  <div id="historyResult" class="result"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>วันที่</th>
          <th>เวลา</th>
          <th>รอบ</th>
          <th>อุณหภูมิ</th>
          <th>สถานะ</th>
          <th>การดำเนินการ</th>
        </tr>
      </thead>
      <tbody id="historyTableBody"></tbody>
    </table>
  </div>
</section>

      <section id="chartPage" class="card hidden">
  <h2 class="section-title">ดูกราฟ</h2>

  <div class="grid">
    <div class="full">
      <label for="chartRoomSelect">ห้อง / สถานที่เก็บ</label>
      <select id="chartRoomSelect" onchange="onChartRoomChange()">
        <option value="">-- เลือกห้อง --</option>
      </select>
    </div>

    <div class="full">
      <label for="chartFridgeSelect">เลือกตู้</label>
      <select id="chartFridgeSelect" onchange="onChartSelectChange()">
        <option value="">-- เลือกตู้ --</option>
      </select>
    </div>

    <div class="full">
      <label for="chartFridgeId">รหัสตู้</label>
      <div class="row-flex">
        <input type="text" id="chartFridgeId" placeholder="เลือกจากรายการ หรือสแกน QR หรือพิมพ์รหัส" />
        <button type="button" class="btn-secondary" onclick="toggleChartScanner()">สแกน QR</button>
      </div>
      <div id="chartReader" class="hidden"></div>
      <div class="small-note">เลือกจากรายการ หรือสแกน QR ได้</div>
    </div>

    <div>
      <label for="chartStartDate">วันที่เริ่ม</label>
      <input type="date" id="chartStartDate" />
    </div>

    <div>
      <label for="chartEndDate">วันที่สิ้นสุด</label>
      <input type="date" id="chartEndDate" />
    </div>

    <div class="full">
      <button class="btn-primary" onclick="loadChartData()">แสดงกราฟ</button>
    </div>
  </div>

  <div id="chartResult" class="result"></div>

  <div class="chart-wrap">
    <canvas id="tempChart"></canvas>
  </div>
</section>
      
    </main>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwP9FDgIr8kid_XKa3yjmVCxJ_SCPPzk9eUbJPC9Md2oQNl8tzTSntuVsbmHc-hczFJ4Q/exec";

    let html5QrCode = null;
    let scannerOpen = false;

    let historyHtml5QrCode = null;
    let historyScannerOpen = false;

    let chartHtml5QrCode = null;
    let chartScannerOpen = false;

    let tempChart = null;
    let lastHistoryRecords = [];
    let lastHistoryFridgeId = '';

    let fridgeMasterList = [];

    function showPage(pageId, btn) {
      document.getElementById('formPage').classList.add('hidden');
      document.getElementById('historyPage').classList.add('hidden');
      document.getElementById(pageId).classList.remove('hidden');

      document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    async function loadFridgeList() {
  try {
    const url = `${WEB_APP_URL}?action=list`;
    const response = await fetch(url);
    const data = await response.json();

    fridgeMasterList = data || [];

    populateRoomDropdown("roomSelect");
    populateRoomDropdown("historyRoomSelect");
    populateRoomDropdown("chartRoomSelect");
  } catch (error) {
    console.error("โหลดรายการตู้ไม่สำเร็จ", error);
  }
}

function populateRoomDropdown(selectId) {
  const select = document.getElementById(selectId);
  if (!select) return;

  const rooms = [...new Set(
    fridgeMasterList
      .map(item => (item.room || "").trim())
      .filter(room => room)
  )].sort();

  select.innerHTML = '<option value="">-- เลือกห้อง --</option>';

  rooms.forEach(room => {
    const option = document.createElement("option");
    option.value = room;
    option.textContent = room;
    select.appendChild(option);
  });
}

function populateFridgeDropdown(selectId, roomValue) {
  const select = document.getElementById(selectId);
  if (!select) return;

  select.innerHTML = '<option value="">-- เลือกตู้ --</option>';

  const filtered = fridgeMasterList.filter(item => {
    if (!roomValue) return true;
    return (item.room || "").trim() === roomValue.trim();
  });

  filtered.forEach(item => {
    const option = document.createElement("option");
    option.value = item.id;
    option.textContent = `${item.id} - ${item.name}`;
    select.appendChild(option);
  });
}

function onRoomChange() {
  const room = document.getElementById("roomSelect").value;
  populateFridgeDropdown("fridgeSelect", room);

  document.getElementById("fridgeSelect").value = "";
  document.getElementById("fridgeId").value = "";

  validateForm();
}

function onHistoryRoomChange() {
  const room = document.getElementById("historyRoomSelect").value;
  populateFridgeDropdown("historyFridgeSelect", room);

  document.getElementById("historyFridgeSelect").value = "";
  document.getElementById("historyFridgeId").value = "";
}

function onHistorySelectChange() {
  const select = document.getElementById("historyFridgeSelect");
  const input = document.getElementById("historyFridgeId");

  if (select && input) {
    input.value = select.value;
  }
}

function onChartRoomChange() {
  const room = document.getElementById("chartRoomSelect").value;
  populateFridgeDropdown("chartFridgeSelect", room);

  document.getElementById("chartFridgeSelect").value = "";
  document.getElementById("chartFridgeId").value = "";
}

function onChartSelectChange() {
  const select = document.getElementById("chartFridgeSelect");
  const input = document.getElementById("chartFridgeId");

  if (select && input) {
    input.value = select.value;
  }
}
    
function onSelectChange() {
  const select = document.getElementById("fridgeSelect");
  const fridgeIdInput = document.getElementById("fridgeId");

  if (select && fridgeIdInput) {
    fridgeIdInput.value = select.value;
  }

  validateForm();
}

function onHistorySelectChange() {
  const select = document.getElementById("historyFridgeSelect");
  const input = document.getElementById("historyFridgeId");

  if (select && input) {
    input.value = select.value;
  }
}

async function toggleHistoryScanner() {
  const reader = document.getElementById("historyReader");

  if (!historyScannerOpen) {
    reader.classList.remove("hidden");

    historyHtml5QrCode = new Html5Qrcode("historyReader");
    historyScannerOpen = true;

    try {
      await historyHtml5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 220 },
        (decodedText) => {
          document.getElementById("historyFridgeId").value = decodedText.trim();

          const historySelect = document.getElementById("historyFridgeSelect");
          if (historySelect) {
            historySelect.value = decodedText.trim();
          }

          stopHistoryScanner();
        },
        () => {}
      );
    } catch (err) {
      showResult(document.getElementById("historyResult"), false, "เปิดกล้องไม่ได้: " + err);
      historyScannerOpen = false;
    }
  } else {
    stopHistoryScanner();
  }
}


    
function stopHistoryScanner() {
  const reader = document.getElementById("historyReader");

  if (historyHtml5QrCode && historyScannerOpen) {
    historyHtml5QrCode.stop()
      .then(() => {
        historyHtml5QrCode.clear();
        reader.classList.add("hidden");
        historyScannerOpen = false;
      })
      .catch(() => {
        reader.classList.add("hidden");
        historyScannerOpen = false;
      });
  }
}

async function toggleChartScanner() {
  const reader = document.getElementById("chartReader");

  if (!chartScannerOpen) {
    reader.classList.remove("hidden");

    chartHtml5QrCode = new Html5Qrcode("chartReader");
    chartScannerOpen = true;

    try {
      await chartHtml5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 220 },
        (decodedText) => {
          document.getElementById("chartFridgeId").value = decodedText.trim();

          const chartSelect = document.getElementById("chartFridgeSelect");
          if (chartSelect) {
            chartSelect.value = decodedText.trim();
          }

          stopChartScanner();
        },
        () => {}
      );
    } catch (err) {
      showResult(document.getElementById("chartResult"), false, "เปิดกล้องไม่ได้: " + err);
      chartScannerOpen = false;
    }
  } else {
    stopChartScanner();
  }
}

function stopChartScanner() {
  const reader = document.getElementById("chartReader");

  if (chartHtml5QrCode && chartScannerOpen) {
    chartHtml5QrCode.stop()
      .then(() => {
        chartHtml5QrCode.clear();
        reader.classList.add("hidden");
        chartScannerOpen = false;
      })
      .catch(() => {
        reader.classList.add("hidden");
        chartScannerOpen = false;
      });
  }
}
    
    function setToday() {
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      const hh = String(today.getHours()).padStart(2, '0');
      const mi = String(today.getMinutes()).padStart(2, '0');

      const todayStr = `${yyyy}-${mm}-${dd}`;
      const timeStr = `${hh}:${mi}`;

      const twoYearsAgo = new Date();
      twoYearsAgo.setFullYear(twoYearsAgo.getFullYear() - 2);
      const yyyy2 = twoYearsAgo.getFullYear();
      const mm2 = String(twoYearsAgo.getMonth() + 1).padStart(2, '0');
      const dd2 = String(twoYearsAgo.getDate()).padStart(2, '0');
      const twoYearsAgoStr = `${yyyy2}-${mm2}-${dd2}`;

      const dateEl = document.getElementById('date');
      const timeEl = document.getElementById('time');
      const startDateEl = document.getElementById('startDate');
      const endDateEl = document.getElementById('endDate');
      const chartStartDateEl = document.getElementById('chartStartDate');
      const chartEndDateEl = document.getElementById('chartEndDate');

      if (dateEl) dateEl.value = todayStr;
      if (timeEl) timeEl.value = timeStr;

      if (startDateEl) startDateEl.value = twoYearsAgoStr;
      if (endDateEl) endDateEl.value = todayStr;

      if (chartStartDateEl) chartStartDateEl.value = twoYearsAgoStr;
      if (chartEndDateEl) chartEndDateEl.value = todayStr;
    }

      async function submitForm() {
        const date = document.getElementById("date").value;
        const round = document.getElementById("round").value;
        const time = document.getElementById("time").value;
        const fridgeId = document.getElementById("fridgeId").value.trim();
        const temp = document.getElementById("temp").value;
        const note = document.getElementById("note").value.trim();
        const resultBox = document.getElementById("result");

        if (!date || !round || !fridgeId || !temp || !time) {
          showResult(resultBox, false, "กรุณากรอกข้อมูลให้ครบ ยกเว้นหมายเหตุ");
          validateForm();
          return;
      }

      const url =
        `${WEB_APP_URL}?date=${encodeURIComponent(date)}&round=${encodeURIComponent(round)}&time=${encodeURIComponent(time)}&fridgeId=${encodeURIComponent(fridgeId)}&temp=${encodeURIComponent(temp)}&note=${encodeURIComponent(note)}`;

      try {
        const response = await fetch(url);
        const data = await response.json();

        if (data.ok) {
          const msg =
`บันทึกสำเร็จ
สถานะ: ${data.status}
ชื่อตู้: ${data.fridgeName}
ประเภทที่เก็บ: ${data.productType}
อุณหภูมิ: ${data.temp} °C
ช่วงที่กำหนด: ${data.minTemp} ถึง ${data.maxTemp} °C
การดำเนินการ: ${data.actionText || '-'}`;
          showResult(resultBox, true, msg);

          document.getElementById("temp").value = "";
          document.getElementById("note").value = "";
          document.getElementById("time").value = getCurrentTime();
        } else {
          showResult(resultBox, false, data.message);
        }
      } catch (error) {
        showResult(resultBox, false, "เชื่อมต่อระบบไม่ได้: " + error);
      }
    }
    
async function loadHistory() {
  const fridgeId = document.getElementById("historyFridgeId").value.trim();
  const startDate = document.getElementById("startDate").value;
  const endDate = document.getElementById("endDate").value;
  const resultBox = document.getElementById("historyResult");
  const tbody = document.getElementById("historyTableBody");

  if (!fridgeId || !startDate || !endDate) {
    showResult(resultBox, false, "กรุณากรอกข้อมูลให้ครบ");
    return;
  }

  const url =
    `${WEB_APP_URL}?action=history&fridgeId=${encodeURIComponent(fridgeId)}&startDate=${encodeURIComponent(startDate)}&endDate=${encodeURIComponent(endDate)}`;

  try {
    const response = await fetch(url);
    const data = await response.json();

    if (!data.ok) {
      showResult(resultBox, false, data.message);
      lastHistoryRecords = [];
      lastHistoryFridgeId = '';
      document.getElementById("historyTableBody").innerHTML = "";
      return;
    }

    lastHistoryRecords = data.records || [];
    lastHistoryFridgeId = fridgeId;

    showResult(
      resultBox,
      true,
      `พบข้อมูล ${data.total} รายการ
ตู้: ${data.fridgeName || '-'}
ช่วงอุณหภูมิ: ${data.minTemp} ถึง ${data.maxTemp} °C`
    );

    tbody.innerHTML = "";

    if (lastHistoryRecords.length === 0) {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td colspan="6" style="text-align:center;">ไม่พบข้อมูลในช่วงวันที่ที่เลือก</td>`;
      tbody.appendChild(tr);
      return;
    }

    lastHistoryRecords.forEach(item => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${item.date || ''}</td>
        <td>${item.time || ''}</td>
        <td>${item.round || ''}</td>
        <td>${item.temp ?? ''}</td>
        <td>${item.status || ''}</td>
        <td>${item.action || ''}</td>
      `;
      tbody.appendChild(tr);
    });

  } catch (error) {
    showResult(resultBox, false, "โหลดข้อมูลไม่ได้: " + error);
    lastHistoryRecords = [];
    lastHistoryFridgeId = '';
    document.getElementById("historyTableBody").innerHTML = "";
  }
}

async function loadChartData() {
  const fridgeId = document.getElementById("chartFridgeId").value.trim();
  const startDate = document.getElementById("chartStartDate").value;
  const endDate = document.getElementById("chartEndDate").value;
  const resultBox = document.getElementById("chartResult");

  if (!fridgeId || !startDate || !endDate) {
    showResult(resultBox, false, "กรุณากรอกข้อมูลให้ครบ");
    return;
  }

  const url =
    `${WEB_APP_URL}?action=history&fridgeId=${encodeURIComponent(fridgeId)}&startDate=${encodeURIComponent(startDate)}&endDate=${encodeURIComponent(endDate)}`;

  try {
    const response = await fetch(url);
    const data = await response.json();

    if (!data.ok) {
      showResult(resultBox, false, data.message);
      clearChartOnly();
      return;
    }

    showResult(
      resultBox,
      true,
      `พบข้อมูล ${data.total} รายการ
ตู้: ${data.fridgeName || '-'}
ช่วงอุณหภูมิ: ${data.minTemp} ถึง ${data.maxTemp} °C`
    );

    if (!data.records || data.records.length === 0) {
      clearChartOnly();
      return;
    }

    drawChart(data.records, data.minTemp, data.maxTemp, fridgeId);

  } catch (error) {

function onSelectChange() {
  const select = document.getElementById("fridgeSelect");
  const fridgeIdInput = document.getElementById("fridgeId");

  if (select && fridgeIdInput) {
    fridgeIdInput.value = select.value;

function drawChart(records, minTemp, maxTemp, fridgeId) {
  const ctx = document.getElementById('tempChart').getContext('2d');

  if (tempChart) {
    tempChart.destroy();
  }

  const labels = buildSmartLabels(records);
  const values = records.map(r => Number(r.temp));

  tempChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: `อุณหภูมิ ${fridgeId}`,
          data: values,
          tension: 0.25,
          borderWidth: 3,
          fill: false
        },
        {
          label: 'ต่ำสุด',
          data: labels.map(() => Number(minTemp)),
          borderDash: [6, 6],
          borderWidth: 2,
          fill: false
        },
        {
          label: 'สูงสุด',
          data: labels.map(() => Number(maxTemp)),
          borderDash: [6, 6],
          borderWidth: 2,
          fill: false
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: {
          position: 'top'
        },
        tooltip: {
          callbacks: {
            title: function(context) {
              const index = context[0].dataIndex;
              const r = records[index];
              return `${r.date} ${r.time || ''}`.trim();
            },
            label: function(context) {
              return `อุณหภูมิ: ${context.raw} °C`;
            }
          }
        }
      },
      scales: {
        x: {
          ticks: {
            autoSkip: true,
            maxTicksLimit: 12,
            maxRotation: 0,
            minRotation: 0
          }
        },
        y: {
          beginAtZero: false,
          title: {
            display: true,
            text: 'อุณหภูมิ (°C)'
          }
        }
      }
    }
  });
}

function buildSmartLabels(records) {
  if (!records || records.length === 0) return [];

  const firstDate = parseDisplayDate(records[0].date);
  const lastDate = parseDisplayDate(records[records.length - 1].date);

  if (!firstDate || !lastDate) {
    return records.map(r => `${r.date} ${r.time || ''}`.trim());
  }

  const diffDays = Math.floor((lastDate - firstDate) / (1000 * 60 * 60 * 24));

  // ≤ 7 วัน => แสดงเวลา
  if (diffDays <= 7) {
    return records.map(r => r.time || '');
  }

  // > 7 วัน ถึง ≤ 31 วัน => แสดงวัน/เดือน
  if (diffDays <= 31) {
    return records.map(r => {
      const d = parseDisplayDate(r.date);
      return d ? `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}` : r.date;
    });
  }

  // > 31 วัน ถึง < 365 วัน => แสดงวัน/เดือน
  if (diffDays < 365) {
    return records.map(r => {
      const d = parseDisplayDate(r.date);
      return d ? `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}` : r.date;
    });
  }

  // ≥ 1 ปี => แสดงเดือน/ปี
  return records.map(r => {
    const d = parseDisplayDate(r.date);
    return d ? `${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}` : r.date;
  });
}

function parseDisplayDate(dateStr) {
  if (!dateStr) return null;

  // รองรับ DD/MM/YYYY
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(dateStr)) {
    const [d, m, y] = dateStr.split('/').map(Number);
    return new Date(y, m - 1, d);
  }

  // รองรับ YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
    const [y, m, d] = dateStr.split('-').map(Number);
    return new Date(y, m - 1, d);
  }

  return null;
}

function clearChartOnly() {
  if (tempChart) {
    tempChart.destroy();
    tempChart = null;
  }
}

function clearChartAndTable() {
  clearChartOnly();
  document.getElementById("historyTableBody").innerHTML = "";
}

function exportCSV() {
  if (!lastHistoryRecords || lastHistoryRecords.length === 0) {
    alert("ยังไม่มีข้อมูลสำหรับ export");
    return;
  }

  const headers = ["วันที่", "เวลา", "รอบ", "รหัสตู้", "ชื่อตู้", "ประเภทที่เก็บ", "อุณหภูมิ", "สถานะ", "การดำเนินการ"];
  const rows = lastHistoryRecords.map(r => [
    r.date || '',
    r.time || '',
    r.round || '',
    r.fridgeId || '',
    r.fridgeName || '',
    r.productType || '',
    r.temp ?? '',
    r.status || '',
    r.action || ''
  ]);

  const csvContent = [headers, ...rows]
    .map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(","))
    .join("\n");

  const blob = new Blob(["\ufeff" + csvContent], { type: "text/csv;charset=utf-8;" });
  const link = document.createElement("a");
  const fileName = `history_${lastHistoryFridgeId}_${new Date().toISOString().slice(0,10)}.csv`;

  link.href = URL.createObjectURL(blob);
  link.download = fileName;
  link.click();
}

   
    function showResult(el, ok, text) {
      el.style.display = "block";
      el.className = ok ? "result success" : "result error";
      el.innerText = text;
    }

    function getCurrentTime() {
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      return `${hh}:${mm}`;
    }

    async function toggleScanner() {
      const reader = document.getElementById("reader");

      if (!scannerOpen) {
        reader.classList.remove("hidden");

        html5QrCode = new Html5Qrcode("reader");
        scannerOpen = true;

        try {
          await html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: 220 },
            (decodedText) => {
              document.getElementById("fridgeId").value = decodedText.trim();

              const fridgeSelect = document.getElementById("fridgeSelect");
              if (fridgeSelect) {
                fridgeSelect.value = decodedText.trim();
              }

              validateForm();
              stopScanner();
            },
            () => {}
          );
        } catch (err) {
          showResult(document.getElementById("result"), false, "เปิดกล้องไม่ได้: " + err);
          scannerOpen = false;
        }
      } else {
        stopScanner();
      }
    }

function setTimeByRound() {
  const round = document.getElementById("round").value;
  const timeInput = document.getElementById("time");

  if (round === "เช้า") {
    timeInput.value = "07:00";
  } else if (round === "เย็น") {
    timeInput.value = "19:00";
  } else {
    timeInput.value = "";
  }

  validateForm();
}

function validateForm() {
  const date = document.getElementById("date")?.value.trim();
  const round = document.getElementById("round")?.value.trim();
  const fridgeId = document.getElementById("fridgeId")?.value.trim();
  const temp = document.getElementById("temp")?.value.trim();
  const time = document.getElementById("time")?.value.trim();
  const submitBtn = document.getElementById("submitBtn");

  const isValid = date && round && fridgeId && temp && time;

  if (submitBtn) {
    submitBtn.disabled = !isValid;
  }
}
    
    function stopScanner() {
      const reader = document.getElementById("reader");

      if (html5QrCode && scannerOpen) {
        html5QrCode.stop()
          .then(() => {
            html5QrCode.clear();
            reader.classList.add("hidden");
            scannerOpen = false;
          })
          .catch(() => {
            reader.classList.add("hidden");
            scannerOpen = false;
          });
      }
    }

    setToday();
    loadFridgeList();
    validateForm();
